services:
  weston:
    image: torizon/weston-imx8:4
    network_mode: host
    cap_add:
      - CAP_SYS_TTY_CONFIG
    volumes:
      - '/dev:/dev'
      - '/tmp:/tmp'
      - '/run/udev/:/run/udev/'
    device_cgroup_rules:
      - 'c 4:* rmw'
      - 'c 253:* rmw'
      - 'c 13:* rmw'
      - 'c 226:* rmw'
      - 'c 10:223 rmw'
      - 'c 199:0 rmw'
    command: --developer

  xash3d:
    image: hl-xash3d:1.0
    user: torizon
    device_cgroup_rules:
      - 'c 199:* rmw'
      - 'c 81:* rmw'
      - 'c 234:* rmw'
      - 'c 253:* rmw'
      - 'c 226:* rmw'
      - 'c 235:* rmw'
    volumes:
      - /tmp:/tmp
      - /var/run/dbus:/var/run/dbus
      - /dev:/dev
    depends_on:
      weston:
        condition: service_healthy